<!doctype html>
<html lang="zh-Hant">

    :root {

    body {
      min-height: 100svh;

    main {

      border-top: 1px solid rgba(16,45,38,.2);

    }
    h1 {
      margin: 0;
      font-family: "Noto Serif TC", "Songti TC", serif;
      font-size: clamp(30px, 7vw, 52px);
      line-height: 1.12;
      letter-spacing: 0;
    }
    p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.68;
      font-weight: 720;
    }
    a {
      display: inline-flex;
      margin-top: 22px;

  <script>
    const target = new URL("/quick/", window.location.origin);
    const params = new URLSearchParams(window.location.search);
    target.searchParams.set("utm_source", params.get("utm_source") || "g_start");
    target.searchParams.set("utm_medium", params.get("utm_medium") || "social");
    target.searchParams.set("utm_campaign", params.get("utm_campaign") || "gowind_direct_start");
    if (params.get("video")) target.searchParams.set("video", params.get("video"));
    window.location.replace(target.pathname + target.search);
