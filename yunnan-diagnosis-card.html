<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>雲南路線自測導流圖卡｜若青中國旅策</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --forest: #102d26;
      --cream: #fffaf0;
      --gold: #c99a52;
      --muted: rgba(255,250,240,.78);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #ddd4c7;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    .card {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      color: var(--cream);
      background:
        linear-gradient(90deg, rgba(8,18,15,.94), rgba(8,18,15,.52), rgba(8,18,15,.08)),
        linear-gradient(180deg, rgba(8,18,15,.08), rgba(8,18,15,.82)),
        url("assets/real-yunnan/erhai-cangshan-web.jpg") center / cover no-repeat;
    }

    .inner {
      height: 100%;
      padding: 76px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      font-weight: 900;
    }

    .brand strong {
      font-family: "Noto Serif TC", "Songti TC", serif;
      font-size: 40px;
      letter-spacing: .08em;
    }

    .brand span {
      color: rgba(255,250,240,.72);
      letter-spacing: .18em;
      font-size: 16px;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--gold);
      letter-spacing: .18em;
      font-size: 22px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif TC", "Songti TC", serif;
      font-size: 112px;
      line-height: .98;
      letter-spacing: 0;
    }

    p {
      margin: 32px 0 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 38px;
      line-height: 1.5;
      font-weight: 780;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 850px;
      margin-top: 44px;
    }

    .grid div {
      border: 1px solid rgba(255,250,240,.22);
      background: rgba(255,250,240,.09);
      padding: 22px;
      color: rgba(255,250,240,.86);
      font-size: 26px;
      font-weight: 850;
    }

    .cta {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      border-top: 1px solid rgba(255,250,240,.28);
      padding-top: 28px;
      color: rgba(255,250,240,.82);
      font-size: 28px;
      font-weight: 850;
    }

    .cta b {
      color: var(--cream);
      font-size: 36px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="inner">
      <div class="brand">
        <strong>若青中國旅策</strong>
        <span>YUNNAN ROUTE CHECK</span>
      </div>

      <section>
        <p class="eyebrow">ONE MINUTE CHECK</p>
        <h1>1 分鐘<br>雲南路線自測</h1>
        <p>先判斷你適合大理・沙溪・麗江一週慢走，還是該走 8-9 日延伸版，或直接選旅行社大團。</p>
        <div class="grid">
          <div>天數</div>
          <div>人數</div>
          <div>預算</div>
          <div>旅行節奏</div>
        </div>
      </section>

      <div class="cta">
        <span>不急著報價，先判斷方向</span>
        <b>留言「自測」</b>
      </div>
    </div>
  </main>
</body>
</html>
