name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block customer-copy and content regressions
        run: |
          node scripts/audit-customer-copy-ux.mjs
          node scripts/audit-navigation-continuity.mjs
          node scripts/audit-site-quality.mjs
          node scripts/audit-multilingual-parity.mjs
          node scripts/audit-visible-image-reuse.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare public artifact
        run: |
          mkdir public
          rsync -a ./ public/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='public/' \
            --exclude='scripts/' \
            --exclude='outputs/' \
            --exclude='node_modules/' \
            --exclude='*.md' \
            --exclude='*.csv' \
            --exclude='*.mjs' \
            --exclude='*.gs' \
            --exclude='.gitignore' \
            --exclude='netlify.toml'

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
